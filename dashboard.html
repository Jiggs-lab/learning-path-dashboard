<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PathAI</title>
    <link rel="stylesheet" href="/public/css/main.css">
    <style>
        .dashboard-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background-color: var(--bg-card); border-right: 1px solid var(--border-color); padding: 2rem; display: flex; flex-direction: column; justify-content: space-between; }
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; }
        .milestone-node { background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; display: flex; gap: 1rem; }
        .progress-bar-bg { width: 100%; height: 8px; background-color: var(--border-color); border-radius: 99px; margin-top: 1rem; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease; }
    </style>
    <script>
        if (!localStorage.getItem('loggedInUser')) { window.location.href = '/login.html'; }
    </script>
</head>
<body>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div>
                <h2 style="color: var(--primary-hover); margin-bottom: 2rem;">🧠 PathAI Workspace</h2>
                <div class="form-group">
                    <label>What skill or topic next?</label>
                    <input type="text" id="targetTopic" placeholder="e.g., C++ Vectors">
                </div>
                <div class="form-group">
                    <label>Experience Tier</label>
                    <select id="targetLevel">
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                <button class="btn-primary" style="width: 100%;" onclick="triggerPathGeneration()">Generate Smart Path</button>
            </div>
            
            <button class="btn-secondary" onclick="logoutUser()">Sign Out</button>
        </aside>

        <main class="main-content">
            <section id="progressSectionCard" style="background-color: var(--bg-card); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 id="activePathTitle">Path Title</h2>
                    <h1 id="progressPercentageText" style="color: var(--primary-hover);">0%</h1>
                </div>
                <div class="progress-bar-bg"><div id="dashboardInlineBarFill" class="progress-bar-fill"></div></div>
            </section>

            <div id="roadmapRenderBox">
                <h3 style="color: var(--text-muted); text-align: center; margin-top: 5rem;">No Active Roadmap. Use the sidebar to generate one!</h3>
            </div>
        </main>
    </div>

    <script>
        function logoutUser() {
            localStorage.removeItem('loggedInUser');
            window.location.href = '/';
        }
    </script>
    <script src="/public/js/workspace.js"></script>
</body>
</html>
