<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace - AI Learning Dashboard</title>
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="public/css/dashboard.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div>
                <div class="brand-title">🧠 PathAI Dashboard</div>
                
                <div class="control-group">
                    <label for="targetTopic">What skill or topic next?</label>
                    <input type="text" id="targetTopic" placeholder="e.g., File Handling in C++">
                </div>

                <div class="control-group">
                    <label for="targetLevel">Experience Tier</label>
                    <select id="targetLevel">
                        <option value="Beginner">Beginner Level</option>
                        <option value="Intermediate">Intermediate Level</option>
                        <option value="Advanced">Advanced Level</option>
                    </select>
                </div>

                <button class="btn-primary" style="width: 100%; padding: 0.75rem;" onclick="triggerPathGeneration()">
                    Generate Smart Path
                </button>
            </div>

            <button class="btn-primary" onclick="logoutUser()">
                Sign Out Account
            </button>

            <script>
                function logoutUser() {
                localStorage.removeItem('loggedInUser'); // Clear the session lock
                window.location.href = 'login.html';     // Move them back to start
                }
            </script>
        </aside>

        <main class="main-workspace">
            
            <section id="progressSectionCard" class="progress-card" style="display: none;">
                <div class="progress-header">
                    <div>
                        <h1 id="activePathTitle" class="text-title" style="font-size: 1.5rem; font-weight: 700;">Loading Roadmap Title...</h1>
                        <span id="activePathEstimate" class="text-subtitle" style="font-size: 0.85rem; color: var(--text-muted);">Calculating overall hours...</span>
                    </div>
                    <span id="progressPercentageText" style="font-size: 1.75rem; font-weight: 800; color: var(--primary-hover);">0%</span>
                </div>
                <div class="progress-track-wrapper">
                    <div id="dashboardInlineBarFill" class="progress-fill-bar"></div>
                </div>
            </section>

            <div id="roadmapRenderBox" class="roadmap-feed">
                <div style="text-align: center; padding: 4rem 2rem; color: var(--text-muted);">
                    <h2>No Path Selected</h2>
                    <p style="margin-top: 0.5rem; font-size: 0.9rem;">Input your target objectives on the side menu panel options interface to generate a fresh curriculum path map instantly.</p>
                </div>
            </div>

        </main>
    </div>

    <script src="public/js/dashboard.js"></script>
</body>
</html>
