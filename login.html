<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathAI - Welcome Back</title>
    <link rel="stylesheet" href="/public/css/main.css">
</head>
<body style="background-color: var(--bg-dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; margin: 0;">

    <div style="background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 2.5rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
        <h2 style="color: white; margin-bottom: 0.5rem; text-align: center; font-size: 1.75rem;">Welcome Back</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 2rem;">Log in to access your personal AI learning roadmaps.</p>

        <form id="loginForm" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-main);">Email Address</label>
                <input type="email" id="email" required style="padding: 0.75rem; background-color: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 6px; color: white; font-size: 0.95rem;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--text-main);">Password</label>
                <input type="password" id="password" required style="padding: 0.75rem; background-color: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 6px; color: white; font-size: 0.95rem;">
            </div>

            <button type="submit" style="padding: 0.75rem; background-color: var(--primary); border: none; border-radius: 6px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem;">
                Sign In
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
            Don't have an account? <a href="/signup.html" style="color: var(--primary-hover); text-decoration: none; font-weight: 600;">Create Account</a>
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // FIXED: Hits '/api/login' relatively instead of 'http://localhost:3000/api/login'
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('loggedInUser', data.userName);
                    window.location.href = '/dashboard.html';
                } else {
                    alert(data.message || 'Invalid email credentials or mismatched password.');
                }
            } catch (err) {
                console.error("Authentication Login Pipeline Failure:", err);
                alert('Could not connect to the authentication server.');
            }
        });
    </script>
</body>
</html>
