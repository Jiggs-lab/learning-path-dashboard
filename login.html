<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - PathAI</title>
    <link rel="stylesheet" href="public/css/main.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="margin-bottom: 0.5rem; font-size: 1.75rem;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Log in to continue your tracking journey.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 0.5rem;">Log In</button>
            </form>
            
            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="signup.html" style="color: var(--primary-hover); text-decoration: none; font-weight: 500;">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="public/js/auth.js"></script>
</body>
</html>
