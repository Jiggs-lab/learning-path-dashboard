<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - PathAI</title>
    <link rel="stylesheet" href="/public/css/main.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Log in to continue your journey.</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Log In</button>
            </form>
            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="/signup.html" style="color: var(--primary-hover);">Sign Up</a>
            </p>
        </div>
    </div>
    <script src="/public/js/auth.js"></script>
</body>
</html>
